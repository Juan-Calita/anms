<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anamnes.IA — Transcrever aula</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<style>
/* ===================== RESET & VARS ===================== */
:root {
  --bg: #F7F6FA;
  --card: #FFFFFF;
  --ink: #20202A;
  --ink-2: #4A4A5A;
  --ink-3: #8A8A9A;
  --line: #ECEAF4;
  --line-2: #E5E2EE;
  --primary: #7942F9;
  --primary-2: #5A28D8;
  --primary-soft: #F1EBFE;
  --primary-softer: #F7F4FF;
  --dark: #1C1832;
  --dark-2: #2A2447;
  --dark-3: #3A3358;
  --dark-text: #ECE7FB;
  --dark-text-dim: #9D96B8;
  --green: #10B981;
  --green-soft: #ECFDF5;
  --amber: #F59E0B;
  --amber-soft: #FEF3C7;
  --red: #EF4444;
  --red-soft: #FEF2F2;
  --radius: 14px;
  --radius-lg: 20px;
  --shadow-sm: 0 1px 2px rgba(28,24,50,.04);
  --shadow: 0 4px 18px rgba(28,24,50,.06);
  --shadow-lg: 0 10px 40px rgba(28,24,50,.10);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* ===================== LAYOUT ===================== */
.app { display: grid; grid-template-columns: 1fr; min-height: 100vh; }

/* ===================== SIDEBAR ===================== */
.sidebar {
  background: var(--dark);
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 0; gap: 6px;
  position: sticky; top: 0; height: 100vh;
}
.side-avatar {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #7942F9, #9F6CFF);
  color: #fff; font-weight: 700; font-size: 13px;
  display: grid; place-items: center; margin-bottom: 8px; letter-spacing: .5px;
}
.side-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: grid; place-items: center;
  color: var(--dark-text-dim); cursor: pointer; transition: all .15s;
}
.side-icon:hover { color: var(--dark-text); background: rgba(255,255,255,.04); }
.side-icon.active { background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(121,66,249,.4); }
.side-icon svg { width: 18px; height: 18px; }
.side-spacer { flex: 1; }

/* ===================== MAIN ===================== */
.main { display: flex; flex-direction: column; min-width: 0; }
.top-header {
  background: var(--dark); color: var(--dark-text);
  padding: 10px 40px;
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  position: relative;
}
.top-header::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 48px;
  background: var(--dark);
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1920 48' preserveAspectRatio='none'><path d='M0,0 L1920,0 L1920,4 C1440,60 480,-28 0,32 Z' fill='black'/></svg>") no-repeat center / 100% 100%;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1920 48' preserveAspectRatio='none'><path d='M0,0 L1920,0 L1920,4 C1440,60 480,-28 0,32 Z' fill='black'/></svg>") no-repeat center / 100% 100%;
}
.brand { display: flex; align-items: center; gap: 12px; justify-self: center; }
.brand-mark {
  width: 40px; height: 40px; border-radius: 10px;
  background: radial-gradient(circle at 30% 30%, #fff 0 2px, transparent 3px),
              radial-gradient(circle at 70% 55%, #fff 0 2px, transparent 3px),
              linear-gradient(135deg, #3A3358, #5A4780);
  border: 1px solid rgba(255,255,255,.1);
  display: grid; place-items: center; position: relative; overflow: hidden;
}
.brand-mark::after {
  content: ''; position: absolute; inset: 6px; border-radius: 50%;
  background: radial-gradient(circle, rgba(159,108,255,.6), transparent 60%);
}
.brand-name { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; color: #fff; }
.brand-tag { font-size: 9.5px; letter-spacing: 2px; color: #9F6CFF; font-weight: 600; margin-top: 2px; }
.user-greet { justify-self: end; color: var(--dark-text-dim); font-size: 13px; }
.user-greet strong { color: var(--dark-text); font-weight: 600; }

.page-wrap {
  padding: 28px 40px 60px;
  background-image: radial-gradient(circle, rgba(121,66,249,.09) 1px, transparent 1px);
  background-size: 18px 18px;
  flex: 1; position: relative; z-index: 1;
}

/* ===================== PAGE HEADER ===================== */
.page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 18px; padding: 0 6px; }
.crumb { font-size: 11px; letter-spacing: 1.8px; color: var(--primary); font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.crumb::before { content: ''; width: 3px; height: 14px; background: var(--primary); border-radius: 2px; }
.page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin: 0; color: var(--ink); }
.page-sub { font-size: 13.5px; color: var(--ink-3); margin-top: 4px; }
.head-actions { display: flex; gap: 10px; align-items: center; }

/* ===================== BUTTONS ===================== */
.btn {
  border: 0; padding: 10px 18px; border-radius: 10px;
  font-family: inherit; font-size: 13.5px; font-weight: 600;
  cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
  transition: all .15s; letter-spacing: -0.1px;
}
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(121,66,249,.3); }
.btn-primary:hover { background: var(--primary-2); transform: translateY(-1px); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-ghost { background: transparent; color: var(--ink-2); border: 1px solid var(--line-2); }
.btn-ghost:hover { background: #fff; color: var(--ink); }
.btn-soft { background: var(--primary-soft); color: var(--primary-2); }
.btn-soft:hover { background: #E7DDFD; }
.btn svg { width: 15px; height: 15px; }

/* ===================== CARDS ===================== */
.card { background: var(--card); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 24px; }

/* ===================== SECTION LABELS ===================== */
.sec-label { font-size: 11px; letter-spacing: 2px; color: var(--primary); font-weight: 700; display: flex; align-items: center; gap: 8px; text-transform: uppercase; margin: 0 0 14px; }
.sec-label::before { content: ''; width: 3px; height: 13px; background: var(--primary); border-radius: 2px; }
.sec-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sec-row .sec-label { margin: 0; }
.link-all { font-size: 12px; color: var(--primary); text-decoration: none; font-weight: 500; }
.link-all:hover { text-decoration: underline; }

/* ===================== UPLOAD ZONE ===================== */
.uploader { background: #fff; border-radius: var(--radius-lg); padding: 40px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.drop-zone { border: 2px dashed var(--line-2); border-radius: 16px; padding: 44px 32px; text-align: center; transition: all .2s; background: var(--primary-softer); cursor: pointer; }
.drop-zone.drag { border-color: var(--primary); background: #EFE6FE; }
.drop-icon { width: 56px; height: 56px; border-radius: 16px; background: var(--primary); color: #fff; display: grid; place-items: center; margin: 0 auto 14px; box-shadow: 0 8px 24px rgba(121,66,249,.3); }
.drop-icon svg { width: 26px; height: 26px; }
.drop-title { font-size: 17px; font-weight: 700; margin: 0 0 4px; }
.drop-sub { font-size: 13px; color: var(--ink-3); margin: 0 0 18px; }
.drop-formats { display: inline-flex; gap: 6px; margin-top: 14px; }
.fmt-chip { font-size: 10.5px; letter-spacing: 1px; padding: 4px 10px; background: #fff; border: 1px solid var(--line-2); border-radius: 99px; color: var(--ink-3); font-weight: 600; text-transform: uppercase; }

/* Text input area */
.text-input-section { margin-top: 20px; border-top: 1px solid var(--line); padding-top: 20px; }
.text-input-label { font-size: 12px; font-weight: 600; color: var(--ink-3); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.text-input-label svg { width: 14px; height: 14px; }
textarea.transcript-input {
  width: 100%; min-height: 120px; border: 1.5px solid var(--line-2);
  border-radius: 12px; padding: 14px; font-family: inherit; font-size: 13.5px;
  color: var(--ink); resize: vertical; outline: none; transition: border-color .15s;
  line-height: 1.6;
}
textarea.transcript-input:focus { border-color: var(--primary); }
textarea.transcript-input::placeholder { color: var(--ink-3); }

/* ===================== STAGES ===================== */
.stages { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 18px; }
.stage { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 14px; transition: all .3s; }
.stage.active { border-color: var(--primary); background: var(--primary-softer); box-shadow: 0 0 0 3px rgba(121,66,249,.08); }
.stage.done { border-color: var(--green); background: var(--green-soft); }
.stage-num { font-size: 10px; letter-spacing: 1.5px; color: var(--ink-3); font-weight: 700; }
.stage.active .stage-num { color: var(--primary); }
.stage.done .stage-num { color: var(--green); }
.stage-name { font-size: 13px; font-weight: 600; margin-top: 4px; }
.stage-bar { height: 3px; background: var(--line); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.stage-bar span { display: block; height: 100%; background: var(--primary); width: 0%; transition: width .4s; }
.stage.done .stage-bar span { background: var(--green); width: 100% !important; }

/* ===================== FILE ROW ===================== */
.file-row { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: #fff; border: 1px solid var(--line); border-radius: 12px; margin-top: 14px; }
.file-ico { width: 40px; height: 40px; border-radius: 10px; background: var(--primary-soft); color: var(--primary); display: grid; place-items: center; }
.file-meta { flex: 1; min-width: 0; }
.file-name { font-weight: 600; font-size: 14px; }
.file-info { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
.file-wave { width: 120px; height: 28px; display: flex; align-items: center; gap: 2px; }
.file-wave i { width: 2px; background: var(--primary); border-radius: 2px; display: block; opacity: .4; animation: wave 1.4s ease-in-out infinite; }
@keyframes wave { 0%,100% { height: 20%; opacity: .3; } 50% { height: 100%; opacity: 1; } }

/* ===================== LIST ===================== */
.list { display: flex; flex-direction: column; gap: 8px; }
.list-item { display: flex; align-items: center; gap: 14px; background: var(--primary-softer); padding: 14px 18px; border-radius: 12px; cursor: pointer; transition: all .12s; border: 1px solid transparent; }
.list-item:hover { background: #EDE4FD; border-color: var(--primary-soft); }
.list-item.selected { background: #fff; border-color: var(--primary); box-shadow: var(--shadow); }
.li-ico { width: 38px; height: 38px; border-radius: 10px; background: #fff; color: var(--primary); display: grid; place-items: center; flex-shrink: 0; }
.li-meta { flex: 1; min-width: 0; }
.li-title { font-weight: 600; font-size: 14px; color: var(--ink); display: flex; align-items: center; gap: 6px; }
.li-sub { font-size: 11.5px; color: var(--ink-3); margin-top: 2px; }
.li-tag { font-size: 10px; letter-spacing: 1px; padding: 3px 9px; border-radius: 99px; font-weight: 700; text-transform: uppercase; }
.li-tag.ok { background: var(--green-soft); color: var(--green); }
.li-tag.proc { background: var(--amber-soft); color: var(--amber); }
.li-duration { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11.5px; color: var(--ink-3); }

/* ===================== STATS ROW ===================== */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; background: #fff; border-radius: var(--radius-lg); padding: 22px 0; box-shadow: var(--shadow); margin-bottom: 18px; }
.stat { text-align: center; border-right: 1px solid var(--line); padding: 0 12px; }
.stat:last-child { border-right: 0; }
.stat-icon { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; margin-bottom: 4px; color: var(--primary); }
.stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.stat-label { font-size: 12px; color: var(--ink-3); }

/* ===================== WORKSPACE ===================== */
.workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.panel { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; min-height: 560px; }
.panel-head { padding: 18px 22px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-size: 14px; font-weight: 700; letter-spacing: -0.2px; }
.panel-head .sec-label { margin: 0; }
.panel-body { padding: 22px; overflow-y: auto; flex: 1; }

/* ===================== TRANSCRIPT ===================== */
.t-line { display: grid; grid-template-columns: 54px 1fr; gap: 14px; padding: 10px; border-bottom: 1px dashed var(--line); font-size: 13.5px; line-height: 1.55; color: var(--ink-2); cursor: pointer; transition: background .1s; border-radius: 8px; margin: 0 -10px; }
.t-line:hover { background: var(--primary-softer); }
.t-line.hl { background: #FFF7D6; }
.t-time { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; color: var(--primary); font-weight: 600; padding-top: 2px; }
.t-speaker { font-weight: 700; color: var(--ink); font-size: 13px; }

/* ===================== SUMMARY ===================== */
.summary h3 { font-size: 15px; font-weight: 700; margin: 22px 0 8px; letter-spacing: -0.2px; }
.summary h3:first-child { margin-top: 0; }
.summary p { font-size: 13.5px; line-height: 1.65; color: var(--ink-2); margin: 0 0 12px; }
.summary ul { padding-left: 18px; margin: 0 0 14px; }
.summary ul li { font-size: 13.5px; line-height: 1.65; color: var(--ink-2); margin-bottom: 6px; }
.summary ul li::marker { color: var(--primary); }
.tldr { background: var(--primary-softer); border-left: 3px solid var(--primary); padding: 14px 16px; border-radius: 0 12px 12px 0; margin-bottom: 18px; }
.tldr-label { font-size: 10px; letter-spacing: 1.5px; color: var(--primary); font-weight: 700; margin-bottom: 4px; }
.tldr-text { font-size: 13.5px; line-height: 1.55; color: var(--ink); }
.chapter { display: grid; grid-template-columns: 60px 1fr; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--line); cursor: pointer; }
.chapter:hover .chapter-title { color: var(--primary); }
.chapter-time { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; color: var(--primary); background: var(--primary-soft); padding: 2px 8px; border-radius: 4px; font-weight: 600; height: fit-content; }
.chapter-title { font-weight: 600; font-size: 13.5px; margin-bottom: 4px; }
.chapter-desc { font-size: 12.5px; color: var(--ink-3); line-height: 1.5; }

/* ===================== PLAYER ===================== */
.player { background: #1C1832; color: #fff; border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
.play-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--primary); color: #fff; display: grid; place-items: center; border: 0; cursor: pointer; flex-shrink: 0; }
.play-btn svg { width: 16px; height: 16px; }
.player-meta { flex: 1; min-width: 0; }
.player-title { font-size: 13px; font-weight: 600; }
.player-time { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; color: var(--dark-text-dim); margin-top: 2px; }
.player-bar { height: 4px; background: var(--dark-3); border-radius: 2px; position: relative; margin-top: 8px; }
.player-bar span { position: absolute; inset: 0 auto 0 0; width: 0%; background: var(--primary); border-radius: 2px; transition: width .3s; }

/* ===================== EXPORT BAR ===================== */
.export-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 14px 22px; border-top: 1px solid var(--line); background: #FAFAFC; align-items: center; }
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; background: #fff; border: 1px solid var(--line-2); border-radius: 99px; font-size: 12px; font-weight: 500; color: var(--ink-2); cursor: pointer; transition: all .12s; font-family: inherit; }
.chip:hover { border-color: var(--primary); color: var(--primary); }
.chip svg { width: 13px; height: 13px; }

/* ===================== ERROR BANNER ===================== */
.error-banner { background: var(--red-soft); border: 1px solid #FECACA; border-radius: 12px; padding: 14px 18px; display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
.error-banner svg { width: 16px; height: 16px; color: var(--red); flex-shrink: 0; margin-top: 1px; }
.error-banner-text { font-size: 13.5px; color: #B91C1C; line-height: 1.5; }

/* ===================== OUSADO VARIANT (dark hero) ===================== */
.hero-dark { background: #1C1832; border-radius: 20px; padding: 32px; color: #fff; position: relative; overflow: hidden; margin-bottom: 18px; }
.hero-dark-glow-1 { position: absolute; top:-80px; right:-80px; width:400px; height:400px; border-radius:50%; background:radial-gradient(circle, rgba(121,66,249,.4), transparent 60%); pointer-events:none; }
.hero-dark-glow-2 { position: absolute; bottom:-100px; left:-100px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle, rgba(159,108,255,.2), transparent 60%); pointer-events:none; }
.waveform { display:flex; gap:2px; height:44px; align-items:center; margin-top:24px; }
.waveform div { flex:1; background:rgba(159,108,255,.5); border-radius:2px; }

/* ===================== ANIMATIONS ===================== */
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }

/* ===================== COPY TOAST ===================== */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:#1C1832; color:#fff; padding:10px 20px; border-radius:99px; font-size:13px; font-weight:600; box-shadow:0 8px 24px rgba(0,0,0,.2); transition:transform .3s; z-index:9999; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>

<div id="root"></div>

function buildMarkdown(data) {
  if (!data) return '';
  let md = `# ${data.titulo || 'Transcrição de Aula'}\n\n`;
  if (data.professor) md += `**Professor:** ${data.professor}\n\n`;
  if (data.tldr) md += `## Resumo\n${data.tldr}\n\n`;
  if (data.pontos_principais?.length) {
    md += `## Pontos Principais\n`;
    data.pontos_principais.forEach(p => md += `- ${p.replace(/<[^>]*>/g,'')}\n`);
    md += '\n';
  }
  if (data.capitulos?.length) {
    md += `## Capítulos\n`;
    data.capitulos.forEach(c => md += `- **${c.tempo}** — ${c.titulo}: ${c.descricao}\n`);
    md += '\n';
  }
  if (data.termos_chave?.length) {
    md += `## Termos-chave\n`;
    data.termos_chave.forEach(t => md += `- **${t.termo}**: ${t.definicao}\n`);
    md += '\n';
  }
  if (data.proximos_passos?.length) {
    md += `## Próximos Passos\n`;
    data.proximos_passos.forEach(p => md += `- ${p}\n`);
    md += '\n';
  }
  if (data.transcricao?.length) {
    md += `## Transcrição\n`;
    data.transcricao.forEach(l => md += `**[${l.t}] ${l.sp}:** ${l.text}\n\n`);
  }
  return md;
}

/* ============================================================
   ANTHROPIC API CALL
   ============================================================ */
async function callAnthropicAPI(content, isAudio, mediaType) {
  const systemPrompt = `Você é um assistente especializado em analisar e estruturar aulas acadêmicas e médicas.
Sua tarefa é analisar o conteúdo fornecido e retornar um JSON estruturado.
Retorne APENAS o JSON válido, sem markdown, sem texto antes ou depois, sem backticks.

O JSON deve ter exatamente este formato:
{
  "titulo": "título descritivo da aula",
  "professor": "nome do professor se identificado, senão null",
  "duracao_estimada": "duração estimada em formato MM:SS ou HH:MM:SS",
  "tldr": "resumo conciso em 2-3 frases, pode usar <b> para negrito em termos importantes",
  "pontos_principais": ["ponto 1 pode usar <b>termos</b>", "ponto 2", "..."],
  "capitulos": [
    {"tempo": "00:00", "titulo": "título do capítulo", "descricao": "descrição breve"},
    ...
  ],
  "termos_chave": [
    {"termo": "nome do termo", "definicao": "definição concisa"},
    ...
  ],
  "proximos_passos": ["sugestão de estudo 1", "sugestão 2", "..."],
  "transcricao": [
    {"t": "00:00", "sp": "Professor/Aluno/Narrador", "text": "trecho da fala"},
    ...
  ]
}

Seja preciso, educacional e útil. Para o campo 'transcricao', quebre o conteúdo em segmentos lógicos com timestamps estimados.`;

  let messages;
  if (isAudio) {
    messages = [{
      role: 'user',
      content: [
        {
          type: 'text',
          text: 'Analise este áudio de aula e retorne o JSON estruturado conforme as instruções.'
        },
        {
          type: 'input_audio',
          source: {
            type: 'base64',
            media_type: mediaType,
            data: content
          }
        }
      ]
    }];
  } else {
    messages = [{
      role: 'user',
      content: `Analise o seguinte texto de aula e retorne o JSON estruturado:\n\n${content}`
    }];
  }

  const response = await fetch('/api/transcribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: systemPrompt,
      messages
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  const raw = data.content?.find(b => b.type === 'text')?.text || '';
  const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
  return JSON.parse(clean);
}

function App() {
  const [appState, setAppState] = useState('empty'); // empty | processing | done | error
  const [stage, setStage] = useState(0);
  const [prog, setProg]   = useState(0);
  const [fileName, setFileName] = useState('');
  const [fileInfo, setFileInfo] = useState('');
  const [result, setResult]     = useState(null);
  const [errorMsg, setErrorMsg] = useState('');
  const [selIdx, setSelIdx]     = useState(0);
  const [history, setHistory]   = useState([]);
  const [toast, setToast]       = useState({ show: false, msg: '' });
  const [textInput, setTextInput] = useState('');
  const fileRef = useRef();
  const progRef = useRef();

  const showToast = (msg) => {
    setToast({ show: true, msg });
    setTimeout(() => setToast({ show: false, msg: '' }), 2000);
  };

  const startProgress = () => {
    let s = 0, p = 0;
    setStage(0); setProg(0);
    progRef.current = setInterval(() => {
      p += 3;
      if (p >= 95) { p = 95; }
      setProg(Math.min(p, 95));
      if (p > 25 && s < 1) { s = 1; setStage(1); }
      if (p > 55 && s < 2) { s = 2; setStage(2); }
      if (p > 80 && s < 3) { s = 3; setStage(3); }
    }, 300);
  };

  const stopProgress = () => {
    clearInterval(progRef.current);
    setStage(3); setProg(100);
  };

  const processInput = useCallback(async (content, isAudio, mtype, fname, finfo) => {
    setFileName(fname);
    setFileInfo(finfo);
    setErrorMsg('');
    setAppState('processing');
    startProgress();

    try {
      const parsed = await callAnthropicAPI(content, isAudio, mtype);
      stopProgress();
      setResult(parsed);
      setHistory(prev => [{
        title: parsed.titulo || fname,
        date: 'Agora',
        duration: parsed.duracao_estimada || '—',
        tag: 'ok',
        data: parsed
      }, ...prev]);
      setSelIdx(0);
      setAppState('done');
    } catch (e) {
      clearInterval(progRef.current);
      setErrorMsg(e.message || 'Erro desconhecido.');
      setAppState('error');
    }
  }, []);

  const handleFile = async (file) => {
    if (!file) return;
    const isAudio = file.type.startsWith('audio/') || file.type.startsWith('video/');
    const isText  = file.type === 'text/plain' || file.name.endsWith('.txt') || file.name.endsWith('.md');

    if (!isAudio && !isText) {
      setErrorMsg('Formato não suportado. Use áudio (MP3, M4A, WAV) ou texto (.txt).');
      setAppState('error');
      return;
    }

    const fname = file.name;
    const finfo = `${(file.size / 1048576).toFixed(1)} MB · ${file.type || 'arquivo'}`;

    if (isText) {
      const text = await file.text();
      processInput(text, false, null, fname, finfo);
    } else {
      const reader = new FileReader();
      reader.onload = (e) => {
        const b64 = e.target.result.split(',')[1];
        processInput(b64, true, file.type, fname, finfo);
      };
      reader.readAsDataURL(file);
    }
  };

  const handleTextSubmit = () => {
    if (!textInput.trim()) return;
    processInput(textInput.trim(), false, null, 'Texto colado', `${textInput.length} caracteres`);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  };

  const handleHistorySelect = (idx) => {
    setSelIdx(idx);
    if (history[idx]) setResult(history[idx].data);
  };

  const copyAll = () => {
    const md = buildMarkdown(result);
    navigator.clipboard.writeText(md).then(() => showToast('Copiado!'));
  };

  // ── RENDER EMPTY ──────────────────────────────────────────────────────────
  const renderEmpty = () => (

          <div className="sec-row">
            <div className="sec-label">HISTÓRICO</div>
          </div>
          <div className="list">
            {history.map((h, i) => (
              <div key={i} className={`list-item ${i === selIdx ? 'selected' : ''}`}
                onClick={() => handleHistorySelect(i)}>
                <div className="li-ico"><Icon name="wave" size={14}/></div>
                <div className="li-meta">
                  <div className="li-title">{h.title}</div>
                  <div className="li-sub">{h.date} · {h.duration}</div>
                </div>
                <span className="li-tag ok">OK</span>
                <Icon name="arrow" size={14}/>
              </div>
            ))}
          </div>
        </div>
      )}
    </>
  );

  // ── RENDER ERROR ──────────────────────────────────────────────────────────
  const renderError = () => (
    <>
      <div className="error-banner">
        <Icon name="alert" size={16}/>
        <div className="error-banner-text">
          <strong>Erro ao processar:</strong> {errorMsg}
          <br/>
          <span style={{fontSize:12}}>Verifique o formato do arquivo ou tente colar o texto manualmente.</span>
        </div>
      </div>
      {renderEmpty()}
    </>
  );

  return (
    <div className="app">
      <div className="main">
        <TopHeader />
        <div className="page-wrap">
          <div className="page-head">
            <div>
              <div className="crumb">AULAS · TRANSCRIÇÕES IA</div>
              <h1 className="page-title">Transcrever aula</h1>
              <div className="page-sub">Envie sua aula gravada. A IA transcreve, estrutura o conteúdo e prepara material de estudo em minutos.</div>
            </div>
            <div className="head-actions">
              {appState === 'done' && (
                <button className="btn btn-ghost" onClick={() => { setAppState('empty'); setTextInput(''); }}>
                  <Icon name="plus" size={14}/> Nova transcrição
                </button>
              )}
            </div>
          </div>

          {appState === 'empty'      && renderEmpty()}
          {appState === 'processing' && renderProcessing()}
          {appState === 'done'       && renderDone()}
          {appState === 'error'      && renderError()}
        </div>
      </div>

      {/* Hidden file input */}
      <input
        ref={fileRef}
        type="file"
        style={{display:'none'}}
        accept="audio/*,video/*,.txt,.md"
        onChange={e => handleFile(e.target.files[0])}
      />

      <Toast message={toast.msg} show={toast.show} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
